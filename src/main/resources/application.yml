server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties]
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-to-a-very-long-production-secret}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  huggingface:
    token: ${HF_TOKEN:${HUGGINGFACE_HUB_TOKEN:}}
    model: ${HF_MODEL:deepseek-ai/DeepSeek-R1:fastest}
